<!-- Topbar -->
<header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between z-10 flex-shrink-0 h-[72px]">
    <div>
        <h1 class="text-xl font-bold text-gray-800">Endpoints</h1>
        <div class="text-xs text-gray-500 font-medium flex items-center gap-1">
            SpringLens <span class="material-symbols-outlined text-[14px]">chevron_right</span> Request <span class="material-symbols-outlined text-[14px]">chevron_right</span> Endpoints
        </div>
    </div>
    <div class="flex items-center gap-3">
        <button class="w-8 h-8 flex items-center justify-center border border-gray-200 rounded-md text-gray-500 hover:text-gray-800 hover:bg-gray-50 bg-white shadow-sm transition-colors cursor-pointer" id="btn-refresh-endpoints">
            <span class="material-symbols-outlined text-[18px]">refresh</span>
        </button>
    </div>
</header>

<div class="flex-1 overflow-auto custom-scrollbar p-6 flex flex-col gap-6 h-[calc(100vh-72px)]">
    <!-- Stats Banner -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-primary/10 text-primary flex items-center justify-center">
                <span class="material-symbols-outlined text-[28px]">api</span>
            </div>
            <div>
                <span class="text-xs font-medium text-gray-400 block uppercase tracking-wider">Unique Routes</span>
                <span class="text-2xl font-bold text-gray-800" id="ep-routes-count">-</span>
            </div>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-success-light text-success flex items-center justify-center">
                <span class="material-symbols-outlined text-[28px]">insights</span>
            </div>
            <div>
                <span class="text-xs font-medium text-gray-400 block uppercase tracking-wider">Most Active Endpoint</span>
                <span class="text-lg font-bold text-gray-800 truncate max-w-[200px]" id="ep-active-route" style="display: block;">-</span>
            </div>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-warning/10 text-warning flex items-center justify-center">
                <span class="material-symbols-outlined text-[28px]">hourglass_empty</span>
            </div>
            <div>
                <span class="text-xs font-medium text-gray-400 block uppercase tracking-wider">Slowest Avg Latency</span>
                <span class="text-lg font-bold text-gray-800" id="ep-slowest-route">-</span>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm flex flex-col flex-1 overflow-hidden">
        <div class="p-5 border-b border-gray-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="relative max-w-sm w-full">
                <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400 text-[18px]">search</span>
                <input type="text" id="endpoint-search" placeholder="Search endpoints..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-primary placeholder-gray-400 transition-colors">
            </div>
            <div id="endpoint-pagination-info" class="text-xs font-semibold text-gray-400">
                <!-- Pagination / counts info -->
            </div>
        </div>

        <div class="flex-1 overflow-auto custom-scrollbar">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-gray-100 text-[10px] font-bold text-gray-400 uppercase tracking-wider bg-gray-50/50 sticky top-0 z-10">
                        <th class="px-6 py-3.5">Method</th>
                        <th class="px-6 py-3.5">Route</th>
                        <th class="px-6 py-3.5 text-center">Hit Count</th>
                        <th class="px-6 py-3.5 text-center">Avg Latency</th>
                        <th class="px-6 py-3.5 text-center">Max Latency</th>
                        <th class="px-6 py-3.5">Service</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100" id="endpointTableBody">
                    <!-- Dynamic rows here -->
                </tbody>
            </table>
        </div>
    </div>
</div>
